name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      # `npm run build` runs `tsc` (typecheck) then `vite build`. The build does
      # not require live Contentful credentials — without them the app simply
      # ships its maintenance fallback — but we pass any configured repo secrets
      # so the build mirrors production and the post-build sitemap can populate.
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_CONTENTFUL_SPACE_ID: ${{ secrets.VITE_CONTENTFUL_SPACE_ID }}
          VITE_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.VITE_CONTENTFUL_ACCESS_TOKEN }}
          VITE_CONTENTFUL_ENVIRONMENT: ${{ secrets.VITE_CONTENTFUL_ENVIRONMENT }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
